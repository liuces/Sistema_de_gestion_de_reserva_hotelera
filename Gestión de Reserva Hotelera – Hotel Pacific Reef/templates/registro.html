<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Pacific Reef — Crear Cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/registro.css">
</head>
<body>

<div class="nav-top">
    <a href="/login">← Volver al inicio</a>
    <span class="nav-brand">🌊 Pacific Reef</span>
</div>

<div class="card">
    <div class="card-header">
        <h2>Crear cuenta</h2>
        <p>Regístrate para reservar tu habitación</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="registroForm" action="/registro" method="POST" onsubmit="validarRegistro(event)">
        <div class="form-row">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Juan" required>
            </div>
            <div class="form-group">
                <label for="ap_pat">Apellido paterno</label>
                <input type="text" id="ap_pat" name="ap_pat" placeholder="González" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="ap_mat">Apellido materno</label>
                <input type="text" id="ap_mat" name="ap_mat" placeholder="Pérez" required>
            </div>
            <div class="form-group">
                <label for="rut">RUT</label>
                <input type="text" id="rut" name="rut" placeholder="12.345.678-9" required>
                <span class="hint">Formato: 12.345.678-9</span>
            </div>
        </div>

        <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="juan@mail.com" required>
        </div>

        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="confirmar">Confirmar contraseña</label>
                <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>

    <div class="login-link">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
    </div>
</div>
<script src="../static/js/registro.js"></script>
</body>
</html>
